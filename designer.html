<!DOCTYPE html><html><head>
<meta charset="utf-8">
<title>Adaptive Foraging Designer</title>
<link rel="stylesheet" href="css/style.css">
</head><body>
<h2>Adaptive Foraging Designer</h2>
<section id="experiment-designer" class="designer" aria-label="Experiment Designer">
  <div class="designer-header">
    <h3>Experiment Designer (Read-only)</h3>
    <div id="designer-summary" class="designer-summary">Loading protocol...</div>
    <p id="designer-description" class="designer-description"></p>
  </div>
  <div class="designer-layout">
    <div id="designer-block-list" class="designer-block-list"></div>
    <div class="designer-details">
      <h4>Block Details</h4>
      <div id="designer-block-details">Select a block to inspect its full definition.</div>
    </div>
  </div>
</section>
<script src="js/stimulusRegistry.js"></script>
<script src="js/designerDefinitionResolver.js"></script>
<script src="js/experimentDesigner.js"></script>
</body></html>
